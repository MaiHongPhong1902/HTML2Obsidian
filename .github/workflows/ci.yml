name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        # The unit tests only exercise pure helpers; install the lightweight
        # parsing stack plus the test tooling. Heavy/optional backends
        # (playwright, spacy, trafilatura, markitdown) are imported lazily and
        # are not needed to run the suite.
        run: |
          python -m pip install --upgrade pip
          pip install "beautifulsoup4>=4.12.0" "lxml>=5.2.0" "httpx>=0.28.0" "pytest>=8.0.0" "PyYAML>=6.0"

      - name: Byte-compile all sources
        run: python -m compileall -q tools note.py

      - name: Run tests
        run: python -m pytest -q
