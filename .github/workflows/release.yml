name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Verify tests before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "beautifulsoup4>=4.12.0" "lxml>=5.2.0" "httpx>=0.28.0" "pytest>=8.0.0" "PyYAML>=6.0"

      - name: Run tests
        run: python -m pytest -q

  release:
    name: Publish GitHub release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          REF_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist
          git archive --format=zip --prefix="HTML2Obsidian-${REF_NAME}/" \
            -o "dist/HTML2Obsidian-${REF_NAME}.zip" HEAD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: dist/*.zip
